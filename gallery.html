<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gallery</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext y='52' font-size='52'%3E%F0%9F%8E%AF%3C/text%3E%3C/svg%3E" />
    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }

      body {
        position: relative;
        cursor: crosshair;
      }

      #resetBtn {
        position: fixed;
        top: 16px;
        right: 16px;
        z-index: 20;
        min-height: 44px;
        padding: 0 16px;
        border: 1px solid rgba(255,255,255,0.2);
        border-radius: 12px;
        background: rgba(10, 14, 32, 0.72);
        color: #fff;
        font: 600 14px/1 Inter, system-ui, sans-serif;
        cursor: pointer;
        backdrop-filter: blur(10px);
      }

      #resetBtn:hover {
        background: rgba(20, 28, 54, 0.9);
      }

      #hint {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 20;
        min-width: 320px;
        min-height: 140px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 24px;
        border-radius: 18px;
        background: rgba(10, 14, 32, 0.58);
        border: 1px solid rgba(255,255,255,0.12);
        color: rgba(255,255,255,0.88);
        font: 600 18px/1.3 Inter, system-ui, sans-serif;
        backdrop-filter: blur(8px);
        pointer-events: none;
        transition: opacity 220ms ease;
      }

      #hint.hidden {
        opacity: 0;
      }

      #rotatePrompt {
        position: fixed;
        inset: 0;
        z-index: 25;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 20px;
        padding: 24px;
        background: rgba(0, 0, 0, 0.12);
        color: white;
        font: 600 22px/1.4 Inter, system-ui, sans-serif;
        backdrop-filter: blur(1px);
      }

      #rotatePromptText {
        order: 1;
        text-shadow: 0 3px 14px rgba(0,0,0,0.7);
      }

      #rotateDuck {
        order: 2;
        width: min(28vw, 140px);
        max-width: 140px;
        opacity: 1;
        pointer-events: none;
      }

      @media (orientation: portrait) and (max-width: 900px) {
        #resetBtn {
          display: none;
        }

        #hint {
          display: none;
        }
      }

      #rotatePrompt.show {
        display: flex;
      }

      #bg {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        object-fit: cover;
        user-select: none;
        -webkit-user-drag: none;
        pointer-events: none;
        background: #000;
      }

      canvas {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="rotatePrompt"><div id="rotatePromptText">Rotate your screen to start</div><img id="rotateDuck" src="/gallery-images/1duck.jpg" alt="Duck" /></div>
    <div id="hint">Click mouse to shoot!</div>
    <button id="resetBtn" type="button">Reset</button>
    <video id="bg" src="/gallery-images/gallery-4.mp4" autoplay muted loop playsinline></video>
    <canvas id="fx"></canvas>

    <script>
      let img = document.getElementById("bg");
      const canvas = document.getElementById("fx");
      const ctx = canvas.getContext("2d");
      const sourceLayer = document.createElement("canvas");
      const sourceCtx = sourceLayer.getContext("2d");
      const resetBtn = document.getElementById("resetBtn");
      const hint = document.getElementById("hint");
      const rotatePrompt = document.getElementById("rotatePrompt");

      const holes = [];
      const shards = [];
      const sparks = [];
      const maxHoles = 80;
      const maxShards = 260;
      const gravity = 1800;
      const settleDelayMs = 1800;
      const settledFadeDelayMs = 10000;
      const mobileSettledFadeDelayMs = 1000;
      let pointerX = 0;
      let pointerY = 0;
      let hasPointer = false;
      let lastTime = performance.now();
      let hintTimeout = null;

      function rand(min, max) {
        return min + Math.random() * (max - min);
      }

      function resizeCanvas() {
        const dpr = window.devicePixelRatio || 1;
        const width = Math.max(1, Math.round(window.innerWidth * dpr));
        const height = Math.max(1, Math.round(window.innerHeight * dpr));
        canvas.width = width;
        canvas.height = height;
        sourceLayer.width = width;
        sourceLayer.height = height;
        pointerX = width / 2;
        pointerY = height / 2;
      }

      function pointFromEvent(event) {
        const rect = canvas.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;
        return {
          x: (event.clientX - rect.left) * dpr,
          y: (event.clientY - rect.top) * dpr,
        };
      }

      function isMobilePortraitMode() {
        return window.innerWidth <= 900 && window.innerHeight > window.innerWidth;
      }

      function syncMediaSource() {
        const wantsPortrait = isMobilePortraitMode();
        const nextSrc = wantsPortrait ? "/gallery-images/two-ducks.png" : "/gallery-images/upscaled-2.jpeg";
        const isVideo = nextSrc.endsWith(".mp4");
        if (img.dataset.src === nextSrc) return;

        if (isVideo && img.tagName !== "VIDEO") {
          const video = document.createElement("video");
          video.id = "bg";
          video.src = nextSrc;
          video.autoplay = true;
          video.muted = true;
          video.loop = true;
          video.playsInline = true;
          video.dataset.src = nextSrc;
          img.replaceWith(video);
          img = video;
        } else if (!isVideo && img.tagName !== "IMG") {
          const image = document.createElement("img");
          image.id = "bg";
          image.src = nextSrc;
          image.alt = "Gallery background";
          image.dataset.src = nextSrc;
          img.replaceWith(image);
          img = image;
        } else {
          img.src = nextSrc;
          img.dataset.src = nextSrc;
        }
      }

      function updateRotatePrompt() {
        const show = isMobilePortraitMode();
        rotatePrompt.classList.toggle("show", show);
      }

      function drawImageCover(context, image, width, height) {
        const imageWidth = image.videoWidth || image.naturalWidth || image.width || width;
        const imageHeight = image.videoHeight || image.naturalHeight || image.height || height;
        const scale = Math.max(width / imageWidth, height / imageHeight);
        const drawWidth = imageWidth * scale;
        const drawHeight = imageHeight * scale;
        const x = (width - drawWidth) / 2;
        const desktopOffset = window.innerWidth >= 1024 ? -10 * (window.devicePixelRatio || 1) : 0;
        const y = ((height - drawHeight) / 2) + desktopOffset;
        context.drawImage(image, x, y, drawWidth, drawHeight);
      }

      function showHint() {
        if (!hint) return;
        hint.classList.remove("hidden");
        if (hintTimeout) clearTimeout(hintTimeout);
        hintTimeout = setTimeout(() => {
          hint.classList.add("hidden");
        }, 2000);
      }

      function resetGame() {
        holes.length = 0;
        shards.length = 0;
        sparks.length = 0;
        showHint();
      }

      function wakeUnsupportedSettledShards() {
        for (const shard of shards) {
          if (!shard.settled) continue;

          const floorY = canvas.height - 2 * (window.devicePixelRatio || 1);
          const isOnFloor = shard.y + shard.sh / 2 >= floorY - 1;
          if (isOnFloor) continue;

          let hasSupport = false;
          for (const other of shards) {
            if (other === shard || !other.settled) continue;
            const overlapsX = Math.abs(shard.x - other.x) < (shard.sw + other.sw) * 0.38;
            const sittingOnOther = Math.abs((shard.y + shard.sh / 2) - (other.y - other.sh / 2)) < 6 * (window.devicePixelRatio || 1);
            if (overlapsX && sittingOnOther) {
              hasSupport = true;
              break;
            }
          }

          if (!hasSupport) {
            shard.settled = false;
            shard.groundedAt = null;
            shard.settledAt = null;
            shard.vx = 0;
            shard.vy = 0;
            shard.vr = 0;
          }
        }
      }

      function pruneSettledShards(now) {
        let removedAny = false;
        const fadeDelay = isMobilePortraitMode() ? mobileSettledFadeDelayMs : settledFadeDelayMs;
        for (let i = shards.length - 1; i >= 0; i--) {
          const shard = shards[i];
          if (shard.settled && shard.settledAt != null && now - shard.settledAt >= fadeDelay) {
            shards.splice(i, 1);
            removedAny = true;
          }
        }
        if (removedAny) {
          wakeUnsupportedSettledShards();
        }
      }

      function shootAt(x, y) {
        const dpr = window.devicePixelRatio || 1;
        const radius = rand(20, 38) * dpr;
        holes.push({ x, y, r: radius });
        if (holes.length > maxHoles) holes.shift();

        for (let i = 0; i < 5; i++) {
          const angle = rand(0, Math.PI * 2);
          const dist = Math.sqrt(Math.random()) * radius;
          const cx = x + Math.cos(angle) * dist;
          const cy = y + Math.sin(angle) * dist;
          const w = rand(24, 72) * dpr;
          const h = rand(24, 72) * dpr;
          const sx = Math.max(0, Math.min(sourceLayer.width - w, cx - w * 0.5));
          const sy = Math.max(0, Math.min(sourceLayer.height - h, cy - h * 0.5));
          const dx = cx - x;
          const dy = cy - y;
          const len = Math.hypot(dx, dy) || 1;
          shards.push({
            sx, sy, sw: w, sh: h,
            x: sx + w * 0.5,
            y: sy + h * 0.5,
            vx: (dx / len) * rand(240, 760) + rand(-60, 60),
            vy: (dy / len) * rand(200, 620) - rand(260, 820),
            rot: rand(-0.4, 0.4),
            vr: rand(-6, 6),
            settled: false,
            groundedAt: null,
            settledAt: null,
          });
        }

        if (shards.length > maxShards) {
          shards.splice(0, shards.length - maxShards);
        }

        for (let i = 0; i < 8; i++) {
          const angle = rand(0, Math.PI * 2);
          const speed = rand(240, 820);
          const life = rand(0.15, 0.45);
          sparks.push({
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life,
            maxLife: life,
          });
        }
      }

      function updatePhysics(dt) {
        const floorY = canvas.height - 2 * (window.devicePixelRatio || 1);
        for (const shard of shards) {
          if (shard.settled) continue;
          shard.vy += gravity * dt;
          shard.x += shard.vx * dt;
          shard.y += shard.vy * dt;
          shard.rot += shard.vr * dt;

          if (shard.x - shard.sw / 2 < 0) {
            shard.x = shard.sw / 2;
            shard.vx *= -0.2;
          }
          if (shard.x + shard.sw / 2 > canvas.width) {
            shard.x = canvas.width - shard.sw / 2;
            shard.vx *= -0.2;
          }

          let restingOnSettledPiece = false;
          for (const other of shards) {
            if (other === shard || !other.settled) continue;
            const overlapsX = Math.abs(shard.x - other.x) < (shard.sw + other.sw) * 0.38;
            const touchingTop = shard.y + shard.sh / 2 >= other.y - other.sh / 2 && shard.y < other.y;
            if (overlapsX && touchingTop) {
              const topY = other.y - other.sh / 2;
              shard.y = topY - shard.sh / 2;
              shard.vx *= 0.75;
              shard.vy *= -0.05;
              shard.vr *= 0.7;
              restingOnSettledPiece = true;
              if (shard.groundedAt == null) shard.groundedAt = performance.now();
              break;
            }
          }

          const shardBottom = shard.y + shard.sh / 2;
          const onFloor = shardBottom >= floorY;
          if (onFloor) {
            shard.y = floorY - shard.sh / 2;
            shard.vy *= -0.16;
            shard.vx *= 0.82;
            shard.vr *= 0.8;
            if (shard.groundedAt == null) shard.groundedAt = performance.now();
          }

          if (onFloor || restingOnSettledPiece) {
            if (Math.abs(shard.vy) < 45) shard.vy = 0;
            if (Math.abs(shard.vx) < 12) shard.vx = 0;
            if (Math.abs(shard.vr) < 0.08) shard.vr = 0;
          } else {
            shard.groundedAt = null;
          }

          if (shard.groundedAt != null && performance.now() - shard.groundedAt >= settleDelayMs) {
            shard.vx = 0;
            shard.vy = 0;
            shard.vr = 0;
            shard.settled = true;
            if (shard.settledAt == null) shard.settledAt = performance.now();
          }
        }

        for (let i = sparks.length - 1; i >= 0; i--) {
          const s = sparks[i];
          s.life -= dt;
          if (s.life <= 0) {
            sparks.splice(i, 1);
            continue;
          }
          s.vy += gravity * 0.42 * dt;
          s.x += s.vx * dt;
          s.y += s.vy * dt;
        }
      }

      function holePath(hole, scale = 1) {
        const jag = hole.r * 0.22 * scale;
        ctx.beginPath();
        for (let i = 0; i < 20; i++) {
          const a = (i / 20) * Math.PI * 2;
          const rr = (hole.r * scale) + Math.sin(a * 6 + hole.x * 0.003) * jag + Math.cos(a * 3.7 + hole.y * 0.004) * jag * 0.6;
          const px = hole.x + Math.cos(a) * rr;
          const py = hole.y + Math.sin(a) * rr;
          if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
        }
        ctx.closePath();
      }

      function punchHoleMask(context) {
        context.save();
        context.globalCompositeOperation = "destination-out";
        context.fillStyle = "#000";
        for (const hole of holes) {
          holePath(hole, 1);
          context.fill();
        }
        context.restore();
      }

      function drawHoleRims() {
        for (const hole of holes) {
          const shadow = ctx.createRadialGradient(hole.x, hole.y, hole.r * 0.2, hole.x, hole.y, hole.r * 2.2);
          shadow.addColorStop(0, "rgba(0,0,0,0.65)");
          shadow.addColorStop(0.45, "rgba(0,0,0,0.2)");
          shadow.addColorStop(1, "rgba(0,0,0,0)");
          ctx.fillStyle = shadow;
          ctx.beginPath();
          ctx.arc(hole.x, hole.y, hole.r * 2.2, 0, Math.PI * 2);
          ctx.fill();

          holePath(hole, 1.04);
          ctx.strokeStyle = "rgba(255,255,255,0.18)";
          ctx.lineWidth = 2 * (window.devicePixelRatio || 1);
          ctx.stroke();
        }
      }

      function drawShards() {
        for (const shard of shards) {
          ctx.save();
          ctx.translate(shard.x, shard.y);
          ctx.rotate(shard.rot);
          ctx.drawImage(sourceLayer, shard.sx, shard.sy, shard.sw, shard.sh, -shard.sw / 2, -shard.sh / 2, shard.sw, shard.sh);
          ctx.strokeStyle = "rgba(255,255,255,0.18)";
          ctx.lineWidth = 1.5 * (window.devicePixelRatio || 1);
          ctx.strokeRect(-shard.sw / 2, -shard.sh / 2, shard.sw, shard.sh);
          ctx.restore();
        }
      }

      function drawSparks() {
        for (const spark of sparks) {
          const t = spark.life / spark.maxLife;
          ctx.fillStyle = `rgba(255, ${Math.round(150 + t * 80)}, ${Math.round(40 + t * 40)}, ${0.3 + t * 0.7})`;
          ctx.beginPath();
          ctx.arc(spark.x, spark.y, (2 + t * 2.5) * (window.devicePixelRatio || 1), 0, Math.PI * 2);
          ctx.fill();
        }
      }

      function drawCrosshair() {
        if (!hasPointer) return;
        const dpr = window.devicePixelRatio || 1;
        const r = 16 * dpr;
        const tick = 7 * dpr;
        ctx.strokeStyle = "rgba(255, 77, 103, 0.95)";
        ctx.lineWidth = 2.5 * dpr;
        ctx.beginPath();
        ctx.arc(pointerX, pointerY, r, 0, Math.PI * 2);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(pointerX, pointerY - r - tick);
        ctx.lineTo(pointerX, pointerY - r + tick);
        ctx.moveTo(pointerX, pointerY + r - tick);
        ctx.lineTo(pointerX, pointerY + r + tick);
        ctx.moveTo(pointerX - r - tick, pointerY);
        ctx.lineTo(pointerX - r + tick, pointerY);
        ctx.moveTo(pointerX + r - tick, pointerY);
        ctx.lineTo(pointerX + r + tick, pointerY);
        ctx.stroke();
      }

      function drawCrosshairOverlay() {
        if (!hasPointer) return;
        const rect = canvas.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;
        const x = pointerX / dpr;
        const y = pointerY / dpr;
        const r = 16;
        const tick = 7;

        ctx.save();
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.strokeStyle = "rgba(255, 77, 103, 0.98)";
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(x, y - r - tick);
        ctx.lineTo(x, y - r + tick);
        ctx.moveTo(x, y + r - tick);
        ctx.lineTo(x, y + r + tick);
        ctx.moveTo(x - r - tick, y);
        ctx.lineTo(x - r + tick, y);
        ctx.moveTo(x + r - tick, y);
        ctx.lineTo(x + r + tick, y);
        ctx.stroke();
        ctx.restore();
      }

      function render() {
        const now = performance.now();
        const dt = Math.min((now - lastTime) / 1000, 0.05);
        lastTime = now;
        updatePhysics(dt);
        pruneSettledShards(now);

        const hasActiveEffects = shards.some((shard) => !shard.settled) || sparks.length > 0 || hasPointer;
        const shouldRedrawVideoFrame = img.readyState >= 2 && (hasActiveEffects || Math.floor(now / 100) !== Math.floor((now - dt * 1000) / 100));

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        sourceCtx.clearRect(0, 0, sourceLayer.width, sourceLayer.height);

        if (shouldRedrawVideoFrame) {
          drawImageCover(ctx, img, canvas.width, canvas.height);
          drawImageCover(sourceCtx, img, sourceLayer.width, sourceLayer.height);
        } else {
          drawImageCover(ctx, img, canvas.width, canvas.height);
          drawImageCover(sourceCtx, img, sourceLayer.width, sourceLayer.height);
        }
        punchHoleMask(ctx);
        punchHoleMask(sourceCtx);
        drawHoleRims();
        drawShards();
        drawSparks();
        drawCrosshairOverlay();
        requestAnimationFrame(render);
      }

      window.addEventListener("resize", resizeCanvas);
      resetBtn.addEventListener("click", resetGame);
      canvas.addEventListener("pointermove", (event) => {
        const p = pointFromEvent(event);
        pointerX = p.x;
        pointerY = p.y;
        hasPointer = true;
      });
      canvas.addEventListener("pointerleave", () => {
        hasPointer = false;
      });
      canvas.addEventListener("contextmenu", (event) => event.preventDefault());
      canvas.addEventListener("pointerdown", (event) => {
        const wantsShoot = event.button === 2 || (event.button === 0 && event.shiftKey) || event.button === 0;
        if (!wantsShoot) return;
        event.preventDefault();
        const p = pointFromEvent(event);
        shootAt(p.x, p.y);
      });

      let started = false;
      function startRenderLoop() {
        resizeCanvas();
        if (!started) {
          started = true;
          render();
        }
      }

      function bindMediaListeners() {
        if (img.tagName === "VIDEO") {
          img.addEventListener("loadeddata", startRenderLoop, { once: true });
          img.addEventListener("canplay", startRenderLoop, { once: true });
          if (img.readyState >= 2) startRenderLoop();
        } else {
          img.addEventListener("load", startRenderLoop, { once: true });
          if (img.complete) startRenderLoop();
        }
      }

      function refreshMediaMode() {
        syncMediaSource();
        updateRotatePrompt();
        bindMediaListeners();
      }

      window.addEventListener("resize", () => {
        refreshMediaMode();
        resizeCanvas();
      });

      refreshMediaMode();
      showHint();
    </script>
  </body>
</html>
