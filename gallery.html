<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gallery</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='30' fill='%23fff'/%3E%3Ccircle cx='32' cy='32' r='24' fill='%23d62828'/%3E%3Ccircle cx='32' cy='32' r='18' fill='%23fff'/%3E%3Ccircle cx='32' cy='32' r='12' fill='%23d62828'/%3E%3Ccircle cx='32' cy='32' r='6' fill='%23fff'/%3E%3C/svg%3E" />
    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }

      body {
        position: relative;
        cursor: crosshair;
      }

      #resetBtn {
        position: fixed;
        top: 10px;
        right: 16px;
        z-index: 20;
        min-height: 44px;
        padding: 0 16px;
        border: 1px solid rgba(255,255,255,0.2);
        border-radius: 12px;
        background: rgba(10, 14, 32, 0.72);
        color: #fff;
        font: 600 14px/1 Inter, system-ui, sans-serif;
        cursor: pointer;
        backdrop-filter: blur(10px);
      }

      #resetBtn:hover {
        background: rgba(20, 28, 54, 0.9);
      }

      #saveTargetsBtn {
        position: fixed;
        top: 10px;
        right: 152px;
        z-index: 20;
        min-height: 44px;
        padding: 0 16px;
        border: 1px solid rgba(255,255,255,0.2);
        border-radius: 12px;
        background: rgba(10, 14, 32, 0.72);
        color: #fff;
        font: 600 14px/1 Inter, system-ui, sans-serif;
        cursor: pointer;
        backdrop-filter: blur(10px);
        display: none;
      }

      #saveTargetsBtn.show {
        display: inline-flex;
        align-items: center;
      }

      #resetTargetsBtn {
        position: fixed;
        top: 10px;
        right: 16px;
        z-index: 20;
        min-height: 44px;
        padding: 0 16px;
        border: 1px solid rgba(255,255,255,0.2);
        border-radius: 12px;
        background: rgba(10, 14, 32, 0.72);
        color: #fff;
        font: 600 14px/1 Inter, system-ui, sans-serif;
        cursor: pointer;
        backdrop-filter: blur(10px);
        display: none;
      }

      #resetTargetsBtn.show {
        display: inline-flex;
        align-items: center;
      }

      #experimentLink {
        position: fixed;
        top: 10px;
        left: 16px;
        z-index: 20;
        padding: 10px 14px;
        border-radius: 12px;
        background: rgba(10, 14, 32, 0.58);
        border: 1px solid rgba(255,255,255,0.12);
        color: rgba(255,255,255,0.88);
        font: 500 13px/1.2 Inter, system-ui, sans-serif;
        text-decoration: none;
        backdrop-filter: blur(8px);
      }

      #experimentLink:hover {
        background: rgba(20, 28, 54, 0.82);
      }

      #badgeLink {
        position: fixed;
        left: 16px;
        bottom: 16px;
        z-index: 20;
        display: inline-block;
        font-family: Arial, Helvetica, sans-serif;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 2.16px;
        text-transform: uppercase;
        text-decoration: none;
        padding: 4px 5px 4px 6px;
        border-radius: 0;
        line-height: 1;
        background: #ffffff;
        color: #000000;
        transition: background-color 160ms ease, color 160ms ease;
      }

      #badgeLink:hover {
        background: #000000;
        color: #ffffff;
      }

      #scoreboard {
        position: fixed;
        top: 10px;
        right: 96px;
        transform: none;
        z-index: 20;
        min-height: 44px;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 0 16px;
        border-radius: 12px;
        background: rgba(10, 14, 32, 0.72);
        border: 1px solid rgba(255,255,255,0.12);
        color: #fff;
        font: 600 16px/1.2 Inter, system-ui, sans-serif;
        backdrop-filter: blur(10px);
      }

      #scoreValue {
        color: #39ff14;
      }

      #timerValue {
        color: #ffd166;
      }

      #hint {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 20;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        white-space: nowrap;
        padding: 14px 22px;
        border-radius: 14px;
        background: rgba(10, 14, 32, 0.58);
        border: 1px solid rgba(255,255,255,0.12);
        color: rgba(255,255,255,0.88);
        font: 600 18px/1.3 Inter, system-ui, sans-serif;
        backdrop-filter: blur(8px);
        pointer-events: none;
        transition: opacity 220ms ease;
      }

      #hint.hidden {
        opacity: 0;
      }

      #rotatePrompt {
        position: fixed;
        inset: 0;
        z-index: 25;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        text-align: center;
        padding: 24px;
        background: rgba(0, 0, 0, 0.12);
        color: white;
        font: 600 22px/1.4 Inter, system-ui, sans-serif;
        backdrop-filter: blur(1px);
      }

      #rotatePrompt.show {
        display: flex;
      }

      #rotatePromptText {
        width: 100%;
        position: relative;
        z-index: 2;
        margin-top: -100px;
        text-shadow: 0 3px 14px rgba(0,0,0,0.7);
      }

      #portraitStage {
        display: none;
        width: min(50vw, 220px);
        aspect-ratio: 9 / 16;
        position: relative;
        z-index: 1;
      }

      #portraitVideo {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
      }

      #bg {
        display: none;
      }

      canvas {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        display: block;
      }

      @media (max-width: 900px) {
        #experimentLink {
          display: none;
        }
      }

      @media (orientation: portrait) and (max-width: 900px) {
        #rotatePrompt {
          display: flex;
        }

        #portraitStage {
          display: block;
        }

        #rotatePromptText {
          display: block;
          width: 100%;
          font-size: 20px;
        }

        canvas {
          display: none;
        }

        body {
          cursor: default;
        }

        #resetBtn,
        #saveTargetsBtn,
        #resetTargetsBtn,
        #badgeLink,
        #scoreboard,
        #hint {
          display: none;
        }
      }
    </style>

      function rand(min, max) {
        return min + Math.random() * (max - min);
      }

      function isMobilePortraitMode() {
        return window.innerWidth <= 900 && window.innerHeight > window.innerWidth;
      }

      function isMobileMode() {
        return window.innerWidth <= 900;
      }

      function updateRotatePrompt() {
        const show = isMobilePortraitMode();
        rotatePrompt.classList.toggle("show", show);
        if (show) portraitVideo.play().catch(() => {});
        else portraitVideo.pause();
      }

      function resizeCanvas() {
        const dpr = window.devicePixelRatio || 1;
        const width = Math.max(1, Math.round(window.innerWidth * dpr));
        const height = Math.max(1, Math.round(window.innerHeight * dpr));
        canvas.width = width;
        canvas.height = height;
        worldLayer.width = width;
        worldLayer.height = height;
        pointerX = width / 2;
        pointerY = height / 2;
        if (imageReady) rebuildWorld();
      }

      function pointFromEvent(event) {
        const rect = canvas.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;
        return {
          x: (event.clientX - rect.left) * dpr,
          y: (event.clientY - rect.top) * dpr,
        };
      }

      function computeImageLayout(width, height) {
        const imageWidth = img.naturalWidth || img.width || width;
        const imageHeight = img.naturalHeight || img.height || height;
        const isMobileLandscape = window.innerWidth <= 900 && window.innerWidth > window.innerHeight;
        const scale = Math.max(width / imageWidth, height / imageHeight);
        const drawWidth = imageWidth * scale;
        const drawHeight = imageHeight * scale;
        const x = (width - drawWidth) / 2;
        const desktopOffset = window.innerWidth >= 1024 ? -10 * (window.devicePixelRatio || 1) : 0;
        const mobileOffset = window.innerWidth <= 900 ? -45 * (window.devicePixelRatio || 1) : 0;
        const y = isMobileLandscape
          ? ((height - drawHeight) / 2) + mobileOffset
          : ((height - drawHeight) / 2) + desktopOffset + mobileOffset;
        return { x, y, drawWidth, drawHeight };
      }

      function updateScoreboard() {
        scoreValue.textContent = String(score);
        const maxScore = targets.reduce((sum, target) => sum + (target.points * target.maxHits), 0);
        maxScoreValue.textContent = String(maxScore);
      }

      function updateTimer(now = performance.now()) {
        const remainingMs = Math.max(0, roundEndAt - now);
        timerValue.textContent = String(Math.ceil(remainingMs / 1000));
        if (!gameOver && remainingMs <= 0) {
          gameOver = true;
          hint.textContent = `Time! Final score: ${score}/${maxScoreValue.textContent}`;
          hint.classList.remove("hidden");

      function loadTargetDefs() {
        const saved = localStorage.getItem("galleryTargetDefs");
        if (!saved) return structuredClone(defaultTargetDefs);
        try {
          const parsed = JSON.parse(saved);
          const savedById = new Map(parsed.map((def) => [def.id, def]));
          return defaultTargetDefs.map((def) => savedById.get(def.id) || def);
        } catch {
          return structuredClone(defaultTargetDefs);
        }
      }

      function saveTargetDefs() {
        if (!baseLayout) return;
        const { x, y, drawWidth, drawHeight } = baseLayout;
        const serialized = targets.map((target) => ({
          id: target.id,
          nx: Number(((target.x - x) / drawWidth).toFixed(4)),
          ny: Number(((target.y - y) / drawHeight).toFixed(4)),
          nr: Number((target.r / drawWidth).toFixed(4)),
          points: target.points,
          maxHits: target.maxHits,
        }));
        localStorage.setItem("galleryTargetDefs", JSON.stringify(serialized));
      }

      function rebuildTargets() {
        if (!baseLayout) {
          targets = [];
          return;
        }
        const defs = loadTargetDefs();
        const { x, y, drawWidth, drawHeight } = baseLayout;
        targets = defs.map((def) => ({
          id: def.id,
          x: x + drawWidth * def.nx,
          y: y + drawHeight * def.ny,
          r: drawWidth * def.nr,
          points: def.points,
          hits: 0,
          maxHits: def.maxHits,
        }));
      }

      function rebuildWorld() {
        worldCtx.clearRect(0, 0, worldLayer.width, worldLayer.height);
        baseLayout = computeImageLayout(worldLayer.width, worldLayer.height);
        worldCtx.drawImage(img, baseLayout.x, baseLayout.y, baseLayout.drawWidth, baseLayout.drawHeight);
        rebuildTargets();
        updateScoreboard();
      }

      function showHint() {
        hint.classList.remove("hidden");
        if (hintTimeout) clearTimeout(hintTimeout);
        hintTimeout = setTimeout(() => hint.classList.add("hidden"), 500);
      }

      function resetGame() {
        shards.length = 0;
        sparks.length = 0;
        score = 0;
        gameOver = false;
        roundEndAt = performance.now() + ROUND_DURATION_MS;
        hint.textContent = "Click mouse to shoot!";
        rebuildWorld();
        updateScoreboard();
        updateTimer();
        showHint();
      }

      function getAlphaAt(x, y) {
        const sx = Math.max(0, Math.min(worldLayer.width - 1, Math.round(x)));
        const sy = Math.max(0, Math.min(worldLayer.height - 1, Math.round(y)));
        return worldCtx.getImageData(sx, sy, 1, 1).data[3];
      }

      function makeShardMask(size, seed) {
        const mask = document.createElement("canvas");
        mask.width = size;
        mask.height = size;
        const mctx = mask.getContext("2d");
        const points = 10;
        const center = size / 2;
        const baseR = size * 0.44;
        mctx.beginPath();
        for (let i = 0; i < points; i++) {
          const angle = (i / points) * Math.PI * 2;
          const noise = 0.7 + (((Math.sin(seed + i * 2.17) + 1) / 2) * 0.55);
          const r = baseR * noise;
          const px = center + Math.cos(angle) * r;
          const py = center + Math.sin(angle) * r;
          if (i === 0) mctx.moveTo(px, py);
          else mctx.lineTo(px, py);
        }
        mctx.closePath();
        mctx.fillStyle = "#fff";
        mctx.fill();
        return mask;
      }

      function carveShard(worldX, worldY, size) {
        const sx = Math.round(worldX - size / 2);
        const sy = Math.round(worldY - size / 2);
        const clampedSx = Math.max(0, Math.min(worldLayer.width - size, sx));
        const clampedSy = Math.max(0, Math.min(worldLayer.height - size, sy));
        const mask = makeShardMask(size, worldX * 0.013 + worldY * 0.017 + size);

        const shardCanvas = document.createElement("canvas");
        shardCanvas.width = size;
        shardCanvas.height = size;
        const sctx = shardCanvas.getContext("2d");
        sctx.drawImage(worldLayer, clampedSx, clampedSy, size, size, 0, 0, size, size);
        sctx.globalCompositeOperation = "destination-in";
        sctx.drawImage(mask, 0, 0);

        const alpha = sctx.getImageData(0, 0, size, size).data;
        let visible = 0;
        for (let i = 3; i < alpha.length; i += 4) {
          if (alpha[i] > 8) visible += 1;
        }
        if (visible < size * size * 0.06) {
          return null;
        }

        worldCtx.save();
        worldCtx.globalCompositeOperation = "destination-out";
        worldCtx.drawImage(mask, clampedSx, clampedSy, size, size);
        worldCtx.restore();

        return {
          image: shardCanvas,
          size,
          x: clampedSx + size / 2,
          y: clampedSy + size / 2,
          rot: rand(-0.4, 0.4),
          vr: rand(-6, 6),
          vx: 0,
          vy: 0,
          settled: false,
          groundedAt: null,
          settledAt: null,
        };
      }

      function awardTargetPoints(x, y) {
        for (const target of targets) {
          if (target.hits >= target.maxHits) continue;
          const dist = Math.hypot(x - target.x, y - target.y);
          if (dist > target.r) continue;

          target.hits += 1;
          score += target.points;
          updateScoreboard();
          return;
        }
      }

      function findTargetAt(x, y) {
        return targets.find((target) => Math.hypot(x - target.x, y - target.y) <= target.r) || null;
      }

      function shootAt(x, y) {
        if (gameOver) return;
        const hitTarget = findTargetAt(x, y);
        if (!hitTarget && getAlphaAt(x, y) <= 8) return;

        const dpr = window.devicePixelRatio || 1;
        const radius = rand(16, 28) * dpr;
        let spawned = 0;

        for (let i = 0; i < 5; i++) {
          const angle = rand(0, Math.PI * 2);
          const dist = Math.sqrt(Math.random()) * radius;
          const cx = x + Math.cos(angle) * dist;
          const cy = y + Math.sin(angle) * dist;
          if (getAlphaAt(cx, cy) <= 8) continue;

          const size = Math.round(rand(18, 42) * dpr);
          const shard = carveShard(cx, cy, size);
          if (!shard) continue;

          const dx = cx - x;
          const dy = cy - y;
          const len = Math.hypot(dx, dy) || 1;
          shard.vx = (dx / len) * rand(240, 760) + rand(-60, 60);
          shard.vy = (dy / len) * rand(200, 620) - rand(260, 820);
          shards.push(shard);
          spawned += 1;
        }

        if (!spawned && !hitTarget) return;
        awardTargetPoints(x, y);
        if (shards.length > maxShards) shards.splice(0, shards.length - maxShards);

        for (let i = 0; i < 8; i++) {
          const angle = rand(0, Math.PI * 2);
          const speed = rand(240, 820);
          const life = rand(0.15, 0.45);
          sparks.push({
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life,
            maxLife: life,
          });
        }
      }

      function wakeUnsupportedSettledShards() {
        for (const shard of shards) {
          if (!shard.settled) continue;
          const floorY = canvas.height;
          const isOnFloor = shard.y + shard.size / 2 >= floorY - 1;
          if (isOnFloor) continue;

          let hasSupport = false;
          for (const other of shards) {
            if (other === shard || !other.settled) continue;
            const overlapsX = Math.abs(shard.x - other.x) < (shard.size + other.size) * 0.28;
            const sittingOnOther = Math.abs((shard.y + shard.size / 2) - (other.y - other.size / 2)) < 4 * (window.devicePixelRatio || 1);
            if (overlapsX && sittingOnOther) {
              hasSupport = true;
              break;
            }
          }

          if (!hasSupport) {
            shard.settled = false;
            shard.groundedAt = null;
            shard.settledAt = null;
            shard.vx = 0;
            shard.vy = 0;
            shard.vr = 0;
          }
        }
      }

      function pruneSettledShards(now) {
        if (!isMobileMode()) return;
        let removedAny = false;
        const fadeDelay = mobileSettledFadeDelayMs;
        for (let i = shards.length - 1; i >= 0; i--) {
          const shard = shards[i];
          if (shard.settled && shard.settledAt != null && now - shard.settledAt >= fadeDelay) {
            shards.splice(i, 1);
            removedAny = true;
          }
        }
        if (removedAny) wakeUnsupportedSettledShards();
      }

      function updatePhysics(dt) {
        const floorY = canvas.height;
        for (const shard of shards) {
          if (shard.settled) continue;
          shard.vy += gravity * dt;
          shard.x += shard.vx * dt;
          shard.y += shard.vy * dt;
          shard.rot += shard.vr * dt;

          if (shard.x - shard.size / 2 < 0) {
            shard.x = shard.size / 2;
            shard.vx *= -0.2;
          }
          if (shard.x + shard.size / 2 > canvas.width) {
            shard.x = canvas.width - shard.size / 2;
            shard.vx *= -0.2;
          }

          let restingOnSettledPiece = false;
          for (const other of shards) {
            if (other === shard || !other.settled) continue;
            const overlapsX = Math.abs(shard.x - other.x) < (shard.size + other.size) * 0.28;
            const touchingTop = shard.y + shard.size / 2 >= other.y - other.size / 2 && shard.y < other.y;
            if (overlapsX && touchingTop) {
              const topY = other.y - other.size / 2;
              shard.y = topY - shard.size / 2;
              shard.vx *= 0.75;
              shard.vy *= -0.05;
              shard.vr *= 0.7;
              restingOnSettledPiece = true;
              if (shard.groundedAt == null) shard.groundedAt = performance.now();
              break;
            }
          }

          const shardBottom = shard.y + shard.size / 2;
          const onFloor = shardBottom >= floorY;
          if (onFloor) {
            shard.y = floorY - shard.size / 2;
            shard.vy *= -0.16;
            shard.vx *= 0.82;
            shard.vr *= 0.8;
            if (shard.groundedAt == null) shard.groundedAt = performance.now();
          }

          if (onFloor || restingOnSettledPiece) {
            if (Math.abs(shard.vy) < 45) shard.vy = 0;
            if (Math.abs(shard.vx) < 12) shard.vx = 0;
            if (Math.abs(shard.vr) < 0.08) shard.vr = 0;
          } else {
            shard.groundedAt = null;
          }

          if (shard.groundedAt != null && performance.now() - shard.groundedAt >= settleDelayMs) {
            shard.vx = 0;
            shard.vy = 0;
            shard.vr = 0;
            shard.settled = true;
            if (shard.settledAt == null) shard.settledAt = performance.now();
          }
        }

        for (let i = sparks.length - 1; i >= 0; i--) {
          const s = sparks[i];
          s.life -= dt;
          if (s.life <= 0) {
            sparks.splice(i, 1);
            continue;
          }
          s.vy += gravity * 0.42 * dt;
          s.x += s.vx * dt;
          s.y += s.vy * dt;
        }
      }

      function drawShards() {
        for (const shard of shards) {
          ctx.save();
          ctx.translate(shard.x, shard.y);
          ctx.rotate(shard.rot);
          ctx.drawImage(shard.image, -shard.size / 2, -shard.size / 2, shard.size, shard.size);
          ctx.strokeStyle = "rgba(255,255,255,0.18)";
          ctx.lineWidth = 1.5 * (window.devicePixelRatio || 1);
          ctx.strokeRect(-shard.size / 2, -shard.size / 2, shard.size, shard.size);
          ctx.restore();
        }
      }

      function drawSparks() {
        for (const spark of sparks) {
          const t = spark.life / spark.maxLife;
          ctx.fillStyle = `rgba(255, ${Math.round(150 + t * 80)}, ${Math.round(40 + t * 40)}, ${0.3 + t * 0.7})`;
          ctx.beginPath();
          ctx.arc(spark.x, spark.y, (2 + t * 2.5) * (window.devicePixelRatio || 1), 0, Math.PI * 2);
          ctx.fill();
        }
      }

      function drawTargetDebugOverlay() {
        if (!debugTargets) return;
        const dpr = window.devicePixelRatio || 1;
        ctx.save();
        ctx.lineWidth = 2 * dpr;
        ctx.font = `${12 * dpr}px Inter, system-ui, sans-serif`;
        for (const target of targets) {
          const active = target.id === activeTargetId;
          ctx.strokeStyle = active ? "rgba(255, 210, 0, 0.98)" : "rgba(57, 255, 20, 0.95)";
          ctx.fillStyle = active ? "rgba(255, 210, 0, 0.18)" : "rgba(57, 255, 20, 0.16)";
          ctx.beginPath();
          ctx.arc(target.x, target.y, target.r, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();
          const label = `${target.id} +${target.points}`;
          ctx.fillStyle = "rgba(0,0,0,0.72)";
          const textWidth = ctx.measureText(label).width;
          const labelX = target.x - textWidth / 2 - 8 * dpr;
          const labelY = target.y - target.r - 22 * dpr;
          ctx.fillRect(labelX, labelY, textWidth + 16 * dpr, 18 * dpr);
          ctx.fillStyle = active ? "rgba(255, 210, 0, 0.98)" : "rgba(57, 255, 20, 0.98)";
          ctx.fillText(label, target.x - textWidth / 2, target.y - target.r - 9 * dpr);
        }
        ctx.restore();
      }

      function drawCrosshairOverlay() {
        if (!hasPointer) return;
        const dpr = window.devicePixelRatio || 1;
        const x = pointerX / dpr;
        const y = pointerY / dpr;
        const r = 16;
        const tick = 7;

        ctx.save();
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.strokeStyle = "rgba(255, 77, 103, 0.98)";
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(x, y - r - tick);
        ctx.lineTo(x, y - r + tick);
        ctx.moveTo(x, y + r - tick);
        ctx.lineTo(x, y + r + tick);
        ctx.moveTo(x - r - tick, y);
        ctx.lineTo(x - r + tick, y);
        ctx.moveTo(x + r - tick, y);
        ctx.lineTo(x + r + tick, y);
        ctx.stroke();
        ctx.restore();
      }

      function render() {
        const now = performance.now();
        const dt = Math.min((now - lastTime) / 1000, 0.05);
        lastTime = now;
        updatePhysics(dt);
        pruneSettledShards(now);
        updateTimer(now);

        const isPortraitRotateScreen = isMobilePortraitMode();
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (!isPortraitRotateScreen && imageReady) {
          ctx.drawImage(worldLayer, 0, 0);
          drawShards();
          drawSparks();
          drawTargetDebugOverlay();
          drawCrosshairOverlay();
        }

        requestAnimationFrame(render);
      }

      resetBtn.addEventListener("click", resetGame);
      canvas.addEventListener("pointerleave", () => {
        hasPointer = false;
      });
      canvas.addEventListener("contextmenu", (event) => event.preventDefault());
      canvas.addEventListener("pointerdown", (event) => {
        if (isMobilePortraitMode()) return;
        const p = pointFromEvent(event);

        if (debugTargets && event.button === 0 && !event.shiftKey) {
          const target = findTargetAt(p.x, p.y);
          activeTargetId = target?.id || null;
          return;
        }

        const wantsShoot = event.button === 2 || (event.button === 0 && event.shiftKey) || event.button === 0;
        if (!wantsShoot) return;
        event.preventDefault();
        shootAt(p.x, p.y);
      });

      canvas.addEventListener("pointermove", (event) => {
        const p = pointFromEvent(event);
        pointerX = p.x;
        pointerY = p.y;
        hasPointer = true;

        if (debugTargets && activeTargetId) {
          const target = targets.find((item) => item.id === activeTargetId);
          if (target) {
            target.x = p.x;
            target.y = p.y;
          }
        }
      });

      canvas.addEventListener("pointerup", () => {
        activeTargetId = null;
      });

      canvas.addEventListener("wheel", (event) => {
        if (!debugTargets) return;
        const p = pointFromEvent(event);
        const target = findTargetAt(p.x, p.y) || targets.find((item) => item.id === activeTargetId);
        if (!target) return;
        event.preventDefault();
        const dpr = window.devicePixelRatio || 1;
        target.r = Math.max(8 * dpr, target.r + (event.deltaY < 0 ? 4 * dpr : -4 * dpr));
      }, { passive: false });

      let started = false;
      function startRenderLoop() {
        resizeCanvas();
        imageReady = true;
        rebuildWorld();
        if (!started) {
          started = true;
          render();
        }
      }

      img.addEventListener("load", startRenderLoop, { once: true });
      if (img.complete) startRenderLoop();

      window.addEventListener("resize", () => {
        updateRotatePrompt();
        resizeCanvas();
      });

      if (debugTargets) {
        saveTargetsBtn.classList.add("show");
        resetTargetsBtn.classList.add("show");
      }

      saveTargetsBtn.addEventListener("click", () => {
        saveTargetDefs();
        saveTargetsBtn.textContent = "Saved";
        setTimeout(() => {
          saveTargetsBtn.textContent = "Save targets";
        }, 900);
      });

      resetTargetsBtn.addEventListener("click", () => {
        localStorage.removeItem("galleryTargetDefs");
        rebuildTargets();
        resetTargetsBtn.textContent = "Reset";
        setTimeout(() => {
          resetTargetsBtn.textContent = "Reset targets";
        }, 900);
      });

      updateRotatePrompt();
      showHint();
    </script>
  </body>
</html>
