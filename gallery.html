<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gallery</title>
    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }

      body {
        position: relative;
        cursor: crosshair;
      }

      #bg {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        object-fit: cover;
        user-select: none;
        -webkit-user-drag: none;
        pointer-events: none;
      }

      canvas {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        display: block;
      }
    </style>
  </head>
  <body>
    <img id="bg" src="/shooting-gallery.jpg" alt="Shooting gallery" />
    <canvas id="fx"></canvas>

    <script>
      const img = document.getElementById("bg");
      const canvas = document.getElementById("fx");
      const ctx = canvas.getContext("2d");
      const sourceLayer = document.createElement("canvas");
      const sourceCtx = sourceLayer.getContext("2d");

      const holes = [];
      const shards = [];
      const sparks = [];
      const maxHoles = 100;
      const maxShards = 500;
      const gravity = 1800;
      let pointerX = 0;
      let pointerY = 0;
      let hasPointer = false;
      let lastTime = performance.now();

      function rand(min, max) {
        return min + Math.random() * (max - min);
      }

      function resizeCanvas() {
        const dpr = window.devicePixelRatio || 1;
        const width = Math.max(1, Math.round(window.innerWidth * dpr));
        const height = Math.max(1, Math.round(window.innerHeight * dpr));
        canvas.width = width;
        canvas.height = height;
        sourceLayer.width = width;
        sourceLayer.height = height;
        pointerX = width / 2;
        pointerY = height / 2;
      }

      function pointFromEvent(event) {
        const rect = canvas.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;
        return {
          x: (event.clientX - rect.left) * dpr,
          y: (event.clientY - rect.top) * dpr,
        };
      }

      function drawImageCover(context, image, width, height) {
        const imageWidth = image.naturalWidth || image.width || width;
        const imageHeight = image.naturalHeight || image.height || height;
        const scale = Math.max(width / imageWidth, height / imageHeight);
        const drawWidth = imageWidth * scale;
        const drawHeight = imageHeight * scale;
        const x = (width - drawWidth) / 2;
        const y = (height - drawHeight) / 2;
        context.drawImage(image, x, y, drawWidth, drawHeight);
      }

      function shootAt(x, y) {
        const dpr = window.devicePixelRatio || 1;
        const radius = rand(20, 38) * dpr;
        holes.push({ x, y, r: radius });
        if (holes.length > maxHoles) holes.shift();

        for (let i = 0; i < 8; i++) {
          const angle = rand(0, Math.PI * 2);
          const dist = Math.sqrt(Math.random()) * radius;
          const cx = x + Math.cos(angle) * dist;
          const cy = y + Math.sin(angle) * dist;
          const w = rand(24, 72) * dpr;
          const h = rand(24, 72) * dpr;
          const sx = Math.max(0, Math.min(sourceLayer.width - w, cx - w * 0.5));
          const sy = Math.max(0, Math.min(sourceLayer.height - h, cy - h * 0.5));
          const dx = cx - x;
          const dy = cy - y;
          const len = Math.hypot(dx, dy) || 1;
          shards.push({
            sx, sy, sw: w, sh: h,
            x: sx + w * 0.5,
            y: sy + h * 0.5,
            vx: (dx / len) * rand(240, 760) + rand(-60, 60),
            vy: (dy / len) * rand(200, 620) - rand(260, 820),
            rot: rand(-0.4, 0.4),
            vr: rand(-6, 6),
            settled: false,
          });
        }

        if (shards.length > maxShards) {
          shards.splice(0, shards.length - maxShards);
        }

        for (let i = 0; i < 14; i++) {
          const angle = rand(0, Math.PI * 2);
          const speed = rand(240, 820);
          const life = rand(0.15, 0.45);
          sparks.push({
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life,
            maxLife: life,
          });
        }
      }

      function updatePhysics(dt) {
        const floorY = canvas.height + 100;
        for (const shard of shards) {
          if (shard.settled) continue;
          shard.vy += gravity * dt;
          shard.x += shard.vx * dt;
          shard.y += shard.vy * dt;
          shard.rot += shard.vr * dt;
          if (shard.y - shard.sh > floorY || shard.x + shard.sw < -200 || shard.x - shard.sw > canvas.width + 200) {
            shard.settled = true;
          }
        }

        for (let i = sparks.length - 1; i >= 0; i--) {
          const s = sparks[i];
          s.life -= dt;
          if (s.life <= 0) {
            sparks.splice(i, 1);
            continue;
          }
          s.vy += gravity * 0.42 * dt;
          s.x += s.vx * dt;
          s.y += s.vy * dt;
        }
      }

      function drawHoleWarps() {
        for (const hole of holes) {
          const warpOuter = hole.r * 2.8;
          const ringCount = 8;
          for (let i = 0; i < ringCount; i++) {
            const outerFrac = i / ringCount;
            const innerFrac = (i + 1) / ringCount;
            const ringOuter = warpOuter - outerFrac * (warpOuter - hole.r);
            const ringInner = warpOuter - innerFrac * (warpOuter - hole.r);
            const pull = innerFrac * innerFrac * 0.22;
            const scale = 1 - pull;
            ctx.save();
            ctx.beginPath();
            ctx.arc(hole.x, hole.y, ringOuter, 0, Math.PI * 2);
            ctx.arc(hole.x, hole.y, ringInner, 0, Math.PI * 2, true);
            ctx.clip();
            ctx.translate(hole.x, hole.y);
            ctx.scale(scale, scale);
            ctx.translate(-hole.x, -hole.y);
            ctx.drawImage(sourceLayer, 0, 0);
            ctx.restore();
          }
        }
      }

      function drawHoles() {
        ctx.save();
        ctx.fillStyle = "#000";
        ctx.globalCompositeOperation = "destination-out";
        for (const hole of holes) {
          const jag = hole.r * 0.22;
          ctx.beginPath();
          for (let i = 0; i < 20; i++) {
            const a = (i / 20) * Math.PI * 2;
            const rr = hole.r + Math.sin(a * 6 + hole.x * 0.003) * jag + Math.cos(a * 3.7 + hole.y * 0.004) * jag * 0.6;
            const px = hole.x + Math.cos(a) * rr;
            const py = hole.y + Math.sin(a) * rr;
            if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
          }
          ctx.closePath();
          ctx.fill();
        }
        ctx.restore();
      }

      function drawShards() {
        for (const shard of shards) {
          if (shard.settled) continue;
          ctx.save();
          ctx.translate(shard.x, shard.y);
          ctx.rotate(shard.rot);
          ctx.drawImage(sourceLayer, shard.sx, shard.sy, shard.sw, shard.sh, -shard.sw / 2, -shard.sh / 2, shard.sw, shard.sh);
          ctx.strokeStyle = "rgba(255,255,255,0.18)";
          ctx.lineWidth = 1.5 * (window.devicePixelRatio || 1);
          ctx.strokeRect(-shard.sw / 2, -shard.sh / 2, shard.sw, shard.sh);
          ctx.restore();
        }
      }

      function drawSparks() {
        for (const spark of sparks) {
          const t = spark.life / spark.maxLife;
          ctx.fillStyle = `rgba(255, ${Math.round(150 + t * 80)}, ${Math.round(40 + t * 40)}, ${0.3 + t * 0.7})`;
          ctx.beginPath();
          ctx.arc(spark.x, spark.y, (2 + t * 2.5) * (window.devicePixelRatio || 1), 0, Math.PI * 2);
          ctx.fill();
        }
      }

      function drawCrosshair() {
        if (!hasPointer) return;
        const dpr = window.devicePixelRatio || 1;
        const r = 16 * dpr;
        const tick = 7 * dpr;
        ctx.strokeStyle = "rgba(255, 77, 103, 0.95)";
        ctx.lineWidth = 2.5 * dpr;
        ctx.beginPath();
        ctx.arc(pointerX, pointerY, r, 0, Math.PI * 2);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(pointerX, pointerY - r - tick);
        ctx.lineTo(pointerX, pointerY - r + tick);
        ctx.moveTo(pointerX, pointerY + r - tick);
        ctx.lineTo(pointerX, pointerY + r + tick);
        ctx.moveTo(pointerX - r - tick, pointerY);
        ctx.lineTo(pointerX - r + tick, pointerY);
        ctx.moveTo(pointerX + r - tick, pointerY);
        ctx.lineTo(pointerX + r + tick, pointerY);
        ctx.stroke();
      }

      function render() {
        const now = performance.now();
        const dt = Math.min((now - lastTime) / 1000, 0.05);
        lastTime = now;
        updatePhysics(dt);
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        sourceCtx.clearRect(0, 0, sourceLayer.width, sourceLayer.height);
        drawImageCover(ctx, img, canvas.width, canvas.height);
        drawImageCover(sourceCtx, img, sourceLayer.width, sourceLayer.height);
        drawHoleWarps();
        drawHoles();
        drawShards();
        drawSparks();
        drawCrosshair();
        requestAnimationFrame(render);
      }

      window.addEventListener("resize", resizeCanvas);
      canvas.addEventListener("pointermove", (event) => {
        const p = pointFromEvent(event);
        pointerX = p.x;
        pointerY = p.y;
        hasPointer = true;
      });
      canvas.addEventListener("pointerleave", () => {
        hasPointer = false;
      });
      canvas.addEventListener("contextmenu", (event) => event.preventDefault());
      canvas.addEventListener("pointerdown", (event) => {
        const wantsShoot = event.button === 2 || (event.button === 0 && event.shiftKey) || event.button === 0;
        if (!wantsShoot) return;
        event.preventDefault();
        const p = pointFromEvent(event);
        shootAt(p.x, p.y);
      });

      img.addEventListener("load", () => {
        resizeCanvas();
        render();
      });

      if (img.complete) {
        resizeCanvas();
        render();
      }
    </script>
  </body>
</html>
